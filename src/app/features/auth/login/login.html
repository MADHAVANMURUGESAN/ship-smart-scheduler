<div class="login-wrapper">
  <div class="overlay"></div>

  <div class="card login-card p-5">
    <!-- Logo Section -->
<div class="text-center mb-4">
  <div class="logo-container mb-3">
    <svg width="110" height="110" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

      <!-- Outer System Circle -->
      <circle cx="60" cy="60" r="52"
              fill="none"
              stroke="#0b3a53"
              stroke-width="4"/>

      <!-- Calendar Body -->
      <rect x="35" y="40" width="50" height="45" rx="6"
            fill="#ffffff"
            stroke="#0b3a53"
            stroke-width="3"/>

      <!-- Calendar Top Bar -->
      <rect x="35" y="40" width="50" height="12"
            fill="#0b3a53"/>

      <!-- Calendar Rings -->
      <circle cx="45" cy="35" r="4" fill="#0b3a53"/>
      <circle cx="75" cy="35" r="4" fill="#0b3a53"/>

      <!-- Clock Inside Calendar -->
      <circle cx="60" cy="65" r="12"
              fill="none"
              stroke="#4da3d9"
              stroke-width="2"/>

      <line x1="60" y1="65" x2="60" y2="55"
            stroke="#4da3d9"
            stroke-width="2"
            stroke-linecap="round"/>

      <line x1="60" y1="65" x2="68" y2="65"
            stroke="#4da3d9"
            stroke-width="2"
            stroke-linecap="round"/>

    </svg>
  </div>

  <h2 class="brand-title fw-bold text-dark">Marine Scheduler</h2>
  <p class="brand-subtitle text-muted">
   smart scheduling for efficient maritime operations
  </p>
</div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="form-label">Email</label>
        <input
          type="email"
          class="form-control form-control-lg"
          formControlName="email"
          placeholder="Enter your email"
        />
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control form-control-lg"
          formControlName="password"
          placeholder="Enter your password"
        />
      </div>

      <div class="d-grid">
        <button class="btn btn-primary btn-lg login-btn">Login</button>
      </div>
    </form>

    <div class="text-center mt-4">
      <a routerLink="/login" class="forgot-link">Forgot password?</a>&nbsp;
      <a routerLink="/register" class="forgot-link">Create a new account</a>
    </div>
  </div>
</div>
